<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Safety Events Per Week — Tim Neff Towing Inc</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #f0f2f5;
    padding: 32px;
    color: #1a1a2e;
    min-height: 100vh;
  }
  .report-wrapper {
    max-width: 1300px;
    margin: 0 auto;
  }
  h1 {
    font-size: 22px;
    font-weight: 700;
    color: #111;
    margin-bottom: 4px;
  }
  .subtitle {
    font-size: 13px;
    color: #666;
    margin-bottom: 24px;
  }
  .kpi-row {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 16px;
    margin-bottom: 20px;
  }
  .kpi-card {
    background: #fff;
    border-radius: 10px;
    padding: 20px 24px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.07);
  }
  .kpi-card .label {
    font-size: 12px;
    color: #888;
    margin-bottom: 6px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.03em;
  }
  .kpi-card .value {
    font-size: 34px;
    font-weight: 700;
    color: #111;
    line-height: 1;
  }
  .chart-card {
    background: #fff;
    border-radius: 10px;
    padding: 24px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.07);
  }
  .chart-legend {
    display: flex;
    align-items: center;
    gap: 20px;
    margin-bottom: 16px;
    font-size: 12px;
    color: #555;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .legend-swatch {
    width: 14px;
    height: 14px;
    border-radius: 2px;
  }
  .legend-line {
    width: 20px;
    height: 2px;
    background: #e05252;
  }
  .chart-container {
    position: relative;
    height: 340px;
  }
  .footer-note {
    text-align: right;
    font-size: 11px;
    color: #aaa;
    margin-top: 12px;
  }
</style>
</head>
<body>
<div class="report-wrapper">
  <h1>Safety Events Per Week</h1>
  <p class="subtitle">Tim Neff Towing Inc &mdash; Feb 22, 2026 &ndash; May 30, 2026</p>

  <div class="kpi-row">
    <div class="kpi-card">
      <div class="label">Total events</div>
      <div class="value" id="kpi-total">—</div>
    </div>
    <div class="kpi-card">
      <div class="label">Weeks tracked</div>
      <div class="value" id="kpi-weeks">—</div>
    </div>
    <div class="kpi-card">
      <div class="label">4-Week Trend (% of peak)</div>
      <div class="value" id="kpi-avg">—</div>
    </div>
    <div class="kpi-card">
      <div class="label">Peak week</div>
      <div class="value" id="kpi-peak">—</div>
    </div>
  </div>

  <div class="chart-card">
    <div class="chart-legend">
      <div class="legend-item">
        <div class="legend-swatch" style="background:#7fb3d3;"></div>
        <span>Weekly events</span>
      </div>
      <div class="legend-item">
        <div class="legend-swatch" style="background:#1a5276;"></div>
        <span>Peak week</span>
      </div>
      <div class="legend-item">
        <div class="legend-line" style="background:#f39c12;"></div>
        <span>Trend</span>
      </div>
    </div>
    <div class="chart-container">
      <canvas id="myChart"></canvas>
    </div>
    <div class="footer-note">Generated from iAuditor Safety Inbox export &mdash; Tim Neff Towing Inc</div>
  </div>
</div>

<script>
const weekData = [
  { label: "Feb 23", count: 21 },
  { label: "Mar 2",  count: 13 },
  { label: "Mar 9",  count: 16 },
  { label: "Mar 16", count: 15 },
  { label: "Mar 23", count: 7  },
  { label: "Mar 30", count: 15 },
  { label: "Apr 6",  count: 7  },
  { label: "Apr 13", count: 9  },
  { label: "Apr 20", count: 7  },
  { label: "Apr 27", count: 10 },
  { label: "May 4",  count: 6  },
  { label: "May 11", count: 2  },
  { label: "May 18", count: 5  },
  { label: "May 25", count: 4  },
];

const counts = weekData.map(d => d.count);
const labels = weekData.map(d => d.label);
const total = counts.reduce((a, b) => a + b, 0);
const weeks = counts.length;
const maxVal = Math.max(...counts);
const peakIdx = counts.indexOf(maxVal);
const peakLabel = labels[peakIdx];

// 4-week trend as % of peak
const last4 = counts.slice(-4);
const last4Avg = last4.reduce((a, b) => a + b, 0) / last4.length;
const fourWeekTrend = ((last4Avg / maxVal) * 100).toFixed(1) + '%';

// KPI cards
document.getElementById('kpi-total').textContent = total;
document.getElementById('kpi-weeks').textContent = weeks;
document.getElementById('kpi-avg').textContent = fourWeekTrend;
document.getElementById('kpi-peak').textContent = peakLabel;

// Linear regression trend line
function linearRegression(data) {
  const n = data.length;
  const sumX = data.reduce((s, _, i) => s + i, 0);
  const sumY = data.reduce((s, v) => s + v, 0);
  const sumXY = data.reduce((s, v, i) => s + i * v, 0);
  const sumX2 = data.reduce((s, _, i) => s + i * i, 0);
  const slope = (n * sumXY - sumX * sumY) / (n * sumX2 - sumX * sumX);
  const intercept = (sumY - slope * sumX) / n;
  return data.map((_, i) => parseFloat((intercept + slope * i).toFixed(2)));
}
const trendData = linearRegression(counts);

// Bar colors
const barColors = counts.map((_, i) => i === peakIdx ? '#1a5276' : '#7fb3d3');

const ctx = document.getElementById('myChart').getContext('2d');

new Chart(ctx, {
  type: 'bar',
  data: {
    labels,
    datasets: [
      {
        type: 'bar',
        data: counts,
        backgroundColor: barColors,
        borderRadius: 3,
        borderSkipped: false,
        order: 2,
      },
      {
        type: 'line',
        data: trendData,
        borderColor: '#f39c12',
        borderWidth: 2,
        borderDash: [6, 3],
        pointRadius: 0,
        fill: false,
        tension: 0,
        order: 1,
      }
    ]
  },
  options: {
    responsive: true,
    maintainAspectRatio: false,
    plugins: {
      legend: { display: false },
      tooltip: {
        callbacks: {
          title: (items) => `Week of ${items[0].label}`,
          label: (item) => ` ${item.raw} events`
        }
      }
    },
    scales: {
      x: {
        grid: { display: false },
        ticks: { font: { size: 11 }, color: '#555' }
      },
      y: {
        beginAtZero: true,
        grid: { color: '#e8e8e8' },
        ticks: {
          stepSize: 5,
          font: { size: 11 },
          color: '#555'
        }
      }
    }
  },
  plugins: []
});
</script>
</body>
</html>
